<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Journey — Join as Parent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:#0b0f0d;color:#e7e5e0;}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
    .card{width:100%;max-width:400px;background:#111814;border:1px solid #1c2e26;border-radius:12px;padding:32px;}
    .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#f59e0b,#b45309);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;}
    .logo-name{font-size:16px;font-weight:600;color:#fff;}
    h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.4px;margin-bottom:4px;}
    .sub{font-size:13px;color:#9aa19d;margin-bottom:24px;line-height:1.5;}
    .school-banner{background:#064e3b;border:1px solid #14523f;border-radius:8px;padding:10px 14px;margin-bottom:16px;display:none;}
    .school-banner .slabel{font-size:10px;color:#34d399;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:3px;}
    .school-banner .sname{font-size:14px;font-weight:600;color:#d1fae5;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;color:#9aa19d;letter-spacing:0.4px;text-transform:uppercase;font-weight:500;margin-bottom:6px;}
    .field input{width:100%;padding:10px 13px;border-radius:7px;border:1px solid #1c2e26;background:#0b0f0d;font-size:13px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color 0.15s;color:#e7e5e0;}
    .field input:focus{border-color:#f59e0b;}
    .field input::placeholder{color:#4a5050;}
    .field input.valid{border-color:#10b981;background:#040d09;}
    .field input.invalid{border-color:#ef4444;}
    .field .hint{font-size:11px;color:#6b716d;margin-top:4px;}
    .code-input{font-family:'IBM Plex Mono',monospace!important;font-size:20px!important;letter-spacing:4px;text-transform:uppercase;text-align:center;font-weight:700;}
    .btn-primary{width:100%;padding:11px;border-radius:7px;border:none;background:#f59e0b;color:#451a03;font-size:13px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;cursor:pointer;transition:opacity 0.15s;margin-top:4px;}
    .btn-primary:hover{opacity:0.9;}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
    .error{background:#1f1010;border:1px solid #3d1515;color:#f87171;border-radius:7px;padding:10px 13px;font-size:12px;margin-bottom:14px;}
    .back-link{display:block;text-align:center;margin-top:16px;font-size:12px;color:#6b716d;text-decoration:none;}
    .back-link:hover{color:#f59e0b;}
    .success-screen{text-align:center;padding:10px 0;}
    .success-screen .big{font-size:48px;margin-bottom:14px;}
    .success-screen h2{font-size:20px;font-weight:600;color:#fff;margin-bottom:8px;}
    .success-screen p{font-size:13px;color:#9aa19d;margin-bottom:20px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row"><div class="logo-mark">Q</div><div class="logo-name">Quran Journey</div></div>
    <div id="register-form">
      <h1>Join as a parent</h1>
      <p class="sub">Enter your school's invite code to create your parent account.</p>
      <div id="error" class="error" style="display:none"></div>
      <div class="school-banner" id="school-banner"><div class="slabel">Joining</div><div class="sname" id="school-name-display"></div></div>
      <div class="field"><label>School Invite Code</label><input type="text" id="invite-code" class="code-input" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off" oninput="validateCode()" /><div class="hint" id="code-hint">Enter the code your school gave you.</div></div>
      <div class="field"><label>Your Name</label><input type="text" id="parent-name" placeholder="e.g. Ahmed Al-Rashid" autocomplete="name" /></div>
      <div class="field"><label>Email</label><input type="email" id="parent-email" placeholder="you@gmail.com" autocomplete="email" /></div>
      <div class="field"><label>Password</label><input type="password" id="parent-password" placeholder="Minimum 8 characters" /></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="parent-password2" placeholder="Re-enter password" /></div>
      <button class="btn-primary" id="register-btn" onclick="register()">Create Account →</button>
      <a href="index.html" class="back-link">Already have an account? Sign in</a>
    </div>
    <div id="success-screen" style="display:none">
      <div class="success-screen">
        <div class="big">🎉</div>
        <h2>You're all set!</h2>
        <p>Your parent account has been created. Sign in to view your child's progress.</p>
        <button class="btn-primary" style="max-width:200px;margin:0 auto" onclick="window.location.href='index.html'">Sign In →</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://fdibhjmbabdcphldnvmq.supabase.co';
    const SUPABASE_KEY='sb_publishable_DErpFcOi5m4LMgkVYFP5Kg_6fhVxHqG';
    const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    let validatedOrgId=null,codeTimer=null;
    document.getElementById('invite-code').addEventListener('input',function(){let v=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8);if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);this.value=v;});
    async function validateCode(){
      const code=document.getElementById('invite-code').value.trim().toUpperCase();
      const input=document.getElementById('invite-code'),hint=document.getElementById('code-hint'),banner=document.getElementById('school-banner');
      if(code.length<9){input.className='code-input';banner.style.display='none';validatedOrgId=null;hint.textContent='Enter the code your school gave you.';hint.style.color='';return;}
      clearTimeout(codeTimer);
      codeTimer=setTimeout(async()=>{
        const{data:org}=await db.from('organizations').select('id,name,is_active').eq('invite_code',code).single();
        if(!org){input.className='code-input invalid';hint.textContent='Code not found. Check with your school.';hint.style.color='#f87171';banner.style.display='none';validatedOrgId=null;}
        else if(!org.is_active){input.className='code-input invalid';hint.textContent="This school's account is currently inactive.";hint.style.color='#f87171';banner.style.display='none';validatedOrgId=null;}
        else{input.className='code-input valid';hint.textContent='✓ Code verified!';hint.style.color='#34d399';document.getElementById('school-name-display').textContent=org.name;banner.style.display='block';validatedOrgId=org.id;}
      },500);
    }
    async function register(){
      const code=document.getElementById('invite-code').value.trim().toUpperCase(),name=document.getElementById('parent-name').value.trim(),email=document.getElementById('parent-email').value.trim(),password=document.getElementById('parent-password').value,password2=document.getElementById('parent-password2').value;
      const btn=document.getElementById('register-btn'),errEl=document.getElementById('error');errEl.style.display='none';
      if(!code||code.length<9){errEl.textContent="Please enter your school's invite code.";errEl.style.display='block';return;}
      if(!name){errEl.textContent='Please enter your name.';errEl.style.display='block';return;}
      if(!email||!email.includes('@')){errEl.textContent='Please enter a valid email.';errEl.style.display='block';return;}
      if(password.length<8){errEl.textContent='Password must be at least 8 characters.';errEl.style.display='block';return;}
      if(password!==password2){errEl.textContent='Passwords do not match.';errEl.style.display='block';return;}
      btn.disabled=true;btn.textContent='Creating account…';
      if(!validatedOrgId){const{data:org}=await db.from('organizations').select('id,name,is_active').eq('invite_code',code).single();if(!org||!org.is_active){errEl.textContent='Invalid or inactive invite code.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account →';return;}validatedOrgId=org.id;}
      const{error:authError}=await db.auth.signUp({email,password});
      if(authError&&!authError.message.toLowerCase().includes('already registered')){errEl.textContent=authError.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account →';return;}
      const{error:dbError}=await db.from('users').upsert({email,name,role:'parent',org_id:validatedOrgId,is_active:true,must_change_password:false},{onConflict:'email'});
      if(dbError){errEl.textContent=dbError.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account →';return;}
      document.getElementById('register-form').style.display='none';document.getElementById('success-screen').style.display='block';
    }
    window.addEventListener('DOMContentLoaded',()=>{const p=new URLSearchParams(window.location.search);const code=p.get('code');if(code){const input=document.getElementById('invite-code');let f=code.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8);if(f.length>4)f=f.slice(0,4)+'-'+f.slice(4);input.value=f;validateCode();}});
  </script>
</body>
</html>
