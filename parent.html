<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Journey — Parent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'IBM Plex Sans', sans-serif; background: #fafaf9; color: #0f1411; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; border-bottom: 1px solid #eceae5;
      background: #fff; font-size: 13px; position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo-mark {
      width: 24px; height: 24px; border-radius: 5px;
      background: #0f1411; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700;
    }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .breadcrumb .sep { color: #737773; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 26px; height: 26px; border-radius: 6px;
      background: #fffbeb; color: #b45309;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .signout-btn {
      font-size: 11px; color: #737773; background: none; border: none;
      cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
    }
    .signout-btn:hover { color: #0f1411; }

    .student-selector {
      background: #fff; border-bottom: 1px solid #eceae5;
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    }
    .selector-label { font-size: 11px; color: #737773; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
    .student-select {
      padding: 7px 12px; border-radius: 7px; border: 1px solid #e3e0da;
      font-size: 13px; font-family: 'IBM Plex Sans', sans-serif;
      background: #fff; outline: none; cursor: pointer;
    }
    .student-select:focus { border-color: #047857; }

    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid #eceae5; background: #fff;
    }
    .stat-cell { padding: 14px 18px; border-right: 1px solid #eceae5; }
    .stat-cell:last-child { border-right: none; }
    .stat-label { font-size: 10.5px; color: #737773; letter-spacing: 0.3px; text-transform: uppercase; font-weight: 500; }
    .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-top: 3px; font-variant-numeric: tabular-nums; }
    .stat-sub { font-size: 11px; color: #737773; margin-top: 1px; }

    .main { padding: 20px; max-width: 960px; }

    .card {
      background: #fff; border-radius: 8px;
      border: 1px solid #eceae5; margin-bottom: 20px; overflow: hidden;
    }
    .card-header {
      padding: 14px 20px; border-bottom: 1px solid #eceae5;
      font-size: 11px; font-weight: 600; color: #737773;
      text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* Log rows */
    .log-block {
      padding: 16px 20px; border-bottom: 1px solid #eceae5;
    }
    .log-block:last-child { border-bottom: none; }
    .log-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .log-date { font-size: 12px; font-weight: 600; color: #0f1411; }
    .log-date-sub { font-size: 11px; color: #737773; font-family: 'IBM Plex Mono', monospace; }

    .log-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px;
    }
    .log-section {
      background: #fafaf9; border: 1px solid #eceae5; border-radius: 7px; padding: 10px 12px;
    }
    .log-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px;
      font-weight: 600; color: #737773; margin-bottom: 6px;
    }
    .log-section-val { font-size: 13px; font-weight: 500; }
    .log-section-sub { font-size: 11px; color: #737773; margin-top: 2px; }

    .log-notes {
      font-size: 12px; color: #3a3f3c; background: #fffbeb;
      border: 1px solid #fef3c7; border-radius: 6px; padding: 8px 12px; margin-top: 8px;
    }
    .log-notes-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; color: #b45309; margin-bottom: 3px; }

    .pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500;
    }
    .pill-success { background: #ecfdf5; color: #047857; }
    .pill-warn { background: #fffbeb; color: #b45309; }
    .pill-danger { background: #fef2f2; color: #b91c1c; }

    .empty-state {
      padding: 40px 20px; text-align: center; color: #737773; font-size: 13px;
    }
    .empty-state .big { font-size: 32px; margin-bottom: 8px; }

    .no-student { padding: 80px 20px; text-align: center; color: #737773; }
    .no-student .big { font-size: 40px; margin-bottom: 12px; }
    .no-student .title { font-size: 16px; font-weight: 600; color: #0f1411; margin-bottom: 6px; }

    .loading { padding: 40px; text-align: center; color: #737773; font-size: 13px; }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">Q</div>
      <div class="breadcrumb">
        <span style="font-weight:500">Quran Journey</span>
        <span class="sep">/</span>
        <span id="parent-name-crumb" style="color:#737773">Parent</span>
        <span class="sep">/</span>
        <span>Progress</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="parent-name-display" style="font-size:12px;color:#3a3f3c"></span>
      <div class="avatar" id="parent-avatar">P</div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <!-- Student selector -->
  <div class="student-selector">
    <span class="selector-label">Viewing</span>
    <select class="student-select" id="student-select" onchange="selectStudent()">
      <option value="">Select a student…</option>
    </select>
    <span id="last-updated" style="font-size:11px;color:#737773;margin-left:auto"></span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-label">Total Sessions</div>
      <div class="stat-value" id="stat-sessions">—</div>
      <div class="stat-sub">logged</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Juz Known</div>
      <div class="stat-value" id="stat-juz">—</div>
      <div class="stat-sub">memorized</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Last Session</div>
      <div class="stat-value" id="stat-last" style="font-size:16px;margin-top:5px">—</div>
      <div class="stat-sub" id="stat-last-sub">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Avg Behavior</div>
      <div class="stat-value" id="stat-behavior" style="font-size:16px;margin-top:5px">—</div>
      <div class="stat-sub">last 5 sessions</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="no-student" class="no-student">
      <div class="big">📖</div>
      <div class="title">Select a student above</div>
      <div>Choose your child's name to view their Quran progress.</div>
    </div>

    <div id="student-content" style="display:none">
      <div class="card">
        <div class="card-header">Recent Sessions</div>
        <div id="logs-list"><div class="loading">Loading…</div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fdibhjmbabdcphldnvmq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DErpFcOi5m4LMgkVYFP5Kg_6fhVxHqG';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let students = [];

    const redirectBase = () => window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = redirectBase() + 'index.html'; return; }

      const { data: userData } = await db
        .from('users').select('*').eq('email', session.user.email).single();

      if (!userData || userData.role !== 'parent') {
        window.location.href = redirectBase() + 'index.html'; return;
      }

      currentUser = userData;
      const initials = userData.name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('parent-avatar').textContent = initials;
      document.getElementById('parent-name-display').textContent = userData.name;
      document.getElementById('parent-name-crumb').textContent = userData.name;

      await loadStudents();
    }

    async function loadStudents() {
      const { data } = await db.from('students')
        .select('*').eq('parent_email', currentUser.email).order('name');
      students = data || [];

      const sel = document.getElementById('student-select');
      if (students.length === 0) {
        sel.innerHTML = '<option value="">No students linked to your account yet</option>';
      } else {
        sel.innerHTML = '<option value="">Select a student…</option>' +
          students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        // Auto-select if only one student
        if (students.length === 1) {
          sel.value = students[0].id;
          selectStudent();
        }
      }
    }

    async function selectStudent() {
      const id = parseInt(document.getElementById('student-select').value);
      if (!id) {
        document.getElementById('no-student').style.display = 'block';
        document.getElementById('student-content').style.display = 'none';
        resetStats();
        return;
      }

      const student = students.find(s => s.id === id);

      document.getElementById('no-student').style.display = 'none';
      document.getElementById('student-content').style.display = 'block';
      document.getElementById('logs-list').innerHTML = '<div class="loading">Loading…</div>';

      const { data: logs } = await db
        .from('progress_logs').select('*')
        .eq('student_id', id).order('date', { ascending: false });

      const allLogs = logs || [];

      // Stats
      document.getElementById('stat-sessions').textContent = allLogs.length;
      document.getElementById('stat-juz').textContent = student.juz_target != null ? `${student.juz_target}` : '—';

      if (allLogs.length > 0) {
        const last = allLogs[0];
        const lastDate = new Date(last.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        document.getElementById('stat-last').textContent = lastDate;
        const sabaqInfo = last.sabaq_pages ? `${last.sabaq_pages}p sabaq` : 'Session logged';
        document.getElementById('stat-last-sub').textContent = sabaqInfo;
        document.getElementById('last-updated').textContent = `Last updated ${lastDate}`;
      } else {
        document.getElementById('stat-last').textContent = '—';
        document.getElementById('stat-last-sub').textContent = 'no logs yet';
        document.getElementById('last-updated').textContent = '';
      }

      // Avg behavior last 5
      const recentBehavior = allLogs.slice(0, 5).map(l => l.behavior).filter(Boolean);
      if (recentBehavior.length > 0) {
        const scoreMap = { Excellent: 3, Good: 2, 'Needs Work': 1 };
        const avg = recentBehavior.reduce((s, b) => s + (scoreMap[b] || 0), 0) / recentBehavior.length;
        document.getElementById('stat-behavior').textContent = avg >= 2.5 ? 'Excellent' : avg >= 1.5 ? 'Good' : 'Needs Work';
      } else {
        document.getElementById('stat-behavior').textContent = '—';
      }

      renderLogs(allLogs);
    }

    function renderLogs(logs) {
      const el = document.getElementById('logs-list');
      if (logs.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="big">📝</div>No progress logged yet. Check back after the next session.</div>`;
        return;
      }

      el.innerHTML = logs.map(l => {
        const dateStr = new Date(l.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        const shortDate = new Date(l.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        const sabaqVal = l.sabaq_pages ? `${l.sabaq_pages} pages` : '—';
        const sabaqQ = l.sabaq_quality ? qualityPill(l.sabaq_quality) : '';
        const sabqiVal = [l.sabqi_juz, l.sabqi_pages ? `${l.sabqi_pages}p` : ''].filter(Boolean).join(' · ') || '—';
        const sabqiQ = l.sabqi_quality ? qualityPill(l.sabqi_quality) : '';
        const manzilVal = l.manzil_juz || '—';
        const manzilQ = l.manzil_quality ? qualityPill(l.manzil_quality) : '';

        return `
          <div class="log-block">
            <div class="log-header">
              <div>
                <div class="log-date">${dateStr}</div>
              </div>
              ${l.behavior ? `<span>${qualityPill(l.behavior)} behavior</span>` : ''}
            </div>
            <div class="log-grid">
              <div class="log-section">
                <div class="log-section-title">Sabaq</div>
                <div class="log-section-val">${sabaqVal}</div>
                <div class="log-section-sub">${sabaqQ}</div>
              </div>
              <div class="log-section">
                <div class="log-section-title">Sabqi</div>
                <div class="log-section-val">${sabqiVal}</div>
                <div class="log-section-sub">${sabqiQ}</div>
              </div>
              <div class="log-section">
                <div class="log-section-title">Manzil</div>
                <div class="log-section-val">${manzilVal}</div>
                <div class="log-section-sub">${manzilQ}</div>
              </div>
            </div>
            ${l.teacher_notes ? `
              <div class="log-notes">
                <div class="log-notes-label">Teacher's Note</div>
                ${l.teacher_notes}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function qualityPill(q) {
      if (!q) return '';
      if (q === 'Excellent') return `<span class="pill pill-success">${q}</span>`;
      if (q === 'Good') return `<span class="pill pill-warn">${q}</span>`;
      return `<span class="pill pill-danger">${q}</span>`;
    }

    function resetStats() {
      ['stat-sessions','stat-juz','stat-last','stat-behavior'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      document.getElementById('stat-last-sub').textContent = '—';
      document.getElementById('last-updated').textContent = '';
    }

    async function signOut() {
      await db.auth.signOut();
      window.location.href = redirectBase() + 'index.html';
    }

    init();
  </script>
</body>
</html>
