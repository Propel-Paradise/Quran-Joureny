<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Journey — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; font-family: var(--font); }
    .card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 32px; }
    .strength-bar  { height: 3px; border-radius: 2px; background: var(--surface3); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label { font-size: 10.5px; color: var(--mute); margin-top: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="auth-logo-row">
      <div class="logo-mark-green">Q</div>
      <div class="auth-logo-name">Quran Journey</div>
    </div>

    <div id="loading-state" style="text-align:center;color:var(--text3);padding:20px 0">Verifying reset link…</div>

    <div id="form-state" style="display:none">
      <div class="auth-h1">Set new password</div>
      <p class="auth-subtitle">Choose a strong password for your account.</p>
      <div id="error" class="alert-error" style="display:none"></div>
      <div id="success" class="alert-success" style="display:none"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Minimum 8 characters" oninput="checkStrength()" />
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="new-password2" placeholder="Re-enter password" />
      </div>
      <button class="btn-green full" id="save-btn" onclick="savePassword()" style="margin-top:4px">Set New Password →</button>
    </div>

    <div id="error-state" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">Invalid or expired link</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:20px">This reset link has expired or already been used. Request a new one from the sign-in page.</div>
      <a href="index.html" class="btn-green full" style="display:block;text-align:center">← Back to Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fdibhjmbabdcphldnvmq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DErpFcOi5m4LMgkVYFP5Kg_6fhVxHqG';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const BASE = 'https://propel-paradise.github.io/Quran-Journey';

    function checkStrength() {
      const pw = document.getElementById('new-password').value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
      const labels = ['','Weak','Fair','Good','Strong','Very strong'];
      fill.style.width = `${(score / 5) * 100}%`;
      fill.style.background = colors[score - 1] || '';
      label.textContent = labels[score] || '';
    }

    async function savePassword() {
      const pw = document.getElementById('new-password').value;
      const pw2 = document.getElementById('new-password2').value;
      const btn = document.getElementById('save-btn');
      const errEl = document.getElementById('error');
      const sucEl = document.getElementById('success');
      if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
      if (pw !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      errEl.style.display = 'none'; sucEl.style.display = 'none';
      const { error } = await db.auth.updateUser({ password: pw });
      if (error) {
        errEl.textContent = error.message; errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set New Password →'; return;
      }
      sucEl.textContent = 'Password updated! Redirecting to sign in…';
      sucEl.style.display = 'block';
      setTimeout(() => window.location.href = BASE + '/index.html', 2000);
    }

    // Supabase sends the session via URL hash after a reset link is clicked
    async function init() {
      // Give Supabase a moment to process the hash
      await new Promise(r => setTimeout(r, 500));
      const { data: { session } } = await db.auth.getSession();
      document.getElementById('loading-state').style.display = 'none';
      if (session) {
        document.getElementById('form-state').style.display = 'block';
      } else {
        document.getElementById('error-state').style.display = 'block';
      }
    }

    // Listen for auth state changes (Supabase fires this after processing the hash)
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('form-state').style.display = 'block';
        document.getElementById('error-state').style.display = 'none';
      }
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') savePassword(); });
    init();
  </script>
</body>
</html>
